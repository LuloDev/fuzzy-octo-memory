services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: options-trading-bot:local
    container_name: iron-condor-bot
    restart: unless-stopped
    # Reads Alpaca/Telegram/DATABASE_URL/DRY_RUN from the host .env file.
    # If the file is missing or values are blank the bot refuses to start —
    # fail-loud per the Constitution.
    env_file: .env
    # Force the bind to 0.0.0.0 so Docker's published port (host:3000 ->
    # container:3000) can reach the server. Without this, an env_file value of
    # HOST=127.0.0.1 would make the bot listen on the container's loopback only
    # and the host would see "Connection reset by peer".
    environment:
      HOST: "0.0.0.0"
    ports:
      - "3000:3000"
    # Named volumes so the SQLite DB + any log files survive container restarts.
    # Owned by the in-container `bot` user (uid 1001) automatically by Docker.
    volumes:
      - bot-data:/app/prisma
      - bot-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Cap memory so a runaway loop cannot exhaust the host.
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  bot-data:
  bot-logs: